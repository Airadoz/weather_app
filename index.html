<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather app</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="./index.js" type="module"></script>
    </head>

    <body>
        <div class="outer_wrapper">
            <header>
                <div class="logo">
                    <img src="./assets/images/logo.svg" alt="Project logo" />
                </div>
                <div class="settings dropdown">
                    <!-- <div class="dropdown"> -->
                    <div class="icon">
                        <img
                            src="./assets/images/icon-units.svg"
                            alt="units icon"
                        />
                    </div>
                    <span>Units</span>
                    <div class="drop_icon">
                        <img
                            src="./assets/images/icon-dropdown.svg"
                            alt="dropdown icon"
                        />
                        <!-- </div> -->
                    </div>
                </div>
            </header>
            <div class="wrapper">
                <div class="inner">
                    <div class="top">
                        <div class="title">
                            <h1>How's the sky looking today?</h1>
                        </div>
                        <search>
                            <div class="search">
                                <input
                                    type="text"
                                    placeholder="Search for a place..."
                                />
                                <button type="button" class="btn search">
                                    Search
                                </button>
                            </div>
                        </search>
                    </div>
                    <main>
                        <div class="left">
                            <div class="main-info-wrapper">
                                <div>main top</div>
                            </div>
                            <div class="additional-info-wrapper">
                                <div>additional bottom</div>
                                <div>additional bottom</div>
                                <div>additional bottom</div>
                                <div>additional bottom</div>
                            </div>
                            <div class="forecast-wrapper">
                                <div>asd</div>
                                <div>alskd</div>
                                <div>askdj</div>
                                <div>asdklj</div>
                                <div>asdkl</div>
                                <div>alskdasd</div>
                                <div>asdlk</div>
                            </div>
                        </div>
                        <div class="right">
                            <div class="hourly-forecast-wrapper">
                                <div class="days">
                                    <p>Hourly forecast</p>
                                    <select name="days" id="days">
                                        <option value="monday">Monday</option>
                                        <option value="tuesday">Tuesday</option>
                                        <option value="wednesday">
                                            Wednesday
                                        </option>
                                        <option value="thursday">
                                            Thursday
                                        </option>
                                        <option value="friday">Friday</option>
                                        <option value="saturday">
                                            Saturday
                                        </option>
                                        <option value="sunday">Sunday</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            </div>
        </div>
    </body>

    <section class="templates_wrapper">
        <template id="additional-info">
            <div class="item">
                <p class="sub-title"></p>
                <p class="info"></p>
            </div>
            <div class="item">
                <p class="sub-title"></p>
                <p class="info"></p>
            </div>
            <div class="item">
                <p class="sub-title"></p>
                <p class="info"></p>
            </div>
            <div class="item">
                <p class="sub-title"></p>
                <p class="info"></p>
            </div>
        </template>
    </section>
</html>
